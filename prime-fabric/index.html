<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prime Fabric Pakistan Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    data-company="prime_fabric"
    data-backend-url="http://localhost:4000"
    class="min-h-screen bg-slate-950 text-slate-100"
  >
    <main
      id="pageShell"
      class="relative flex min-h-screen items-center justify-center overflow-hidden px-6 py-12"
    >
      <div class="absolute inset-0">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,_rgba(255,255,255,0.08),_transparent_38%)]"></div>
        <div id="heroGlow" class="absolute inset-x-0 top-0 h-64 bg-gradient-to-b opacity-15 blur-3xl"></div>
        <div class="absolute inset-0 bg-black/20"></div>
      </div>

      <section
        id="loginPanel"
        class="relative z-10 w-full max-w-md rounded-2xl border p-8 shadow-2xl backdrop-blur-sm sm:p-10"
      >
        <div class="mb-10 flex flex-col items-center text-center">
          <div
            id="logoBadge"
            class="mb-5 flex h-16 w-16 items-center justify-center rounded-2xl bg-gradient-to-br text-xl font-bold tracking-wide text-white shadow-lg"
            aria-hidden="true"
          ></div>
          <p
            id="companyName"
            class="text-sm font-semibold uppercase tracking-[0.28em] text-slate-400"
          ></p>
          <h1 id="welcomeTitle" class="mt-4 text-3xl font-semibold tracking-tight text-white"></h1>
          <p id="welcomeText" class="mt-3 max-w-sm text-sm leading-6 text-slate-300"></p>
        </div>

        <section class="space-y-5" aria-label="Authentication">
          <div class="rounded-xl border border-white/10 bg-black/10 px-4 py-4">
            <p class="text-sm font-medium text-slate-200">Authorized Google accounts only</p>
            <p class="mt-2 text-sm leading-6 text-slate-300">
              Continue with Google. Access is granted only after server-side verification of the
              signed-in Google account.
            </p>
          </div>

          <div id="googleButtonWrap" class="flex justify-center rounded-xl bg-white px-3 py-3"></div>
          <p id="accessMessage" class="hidden rounded-xl border px-4 py-3 text-sm font-medium"></p>
        </section>
      </section>
    </main>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="../assets/login.js"></script>
  </body>
</html>
